<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সহজ সমাধান - Realistic Login & Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        /* CSS Reset & Body */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: url('https://i.postimg.cc/vHTXnTPv/j.png') no-repeat center center/cover;
            background-color: #d2b48c; 
            font-family: 'Poppins', sans-serif;
            background-attachment: fixed; 
            overflow-x: hidden; /* শুধুমাত্র ডানে-বামে স্ক্রল বন্ধ রাখা হয়েছে */
        }

        /* --- Login & Initial UI --- */
        .initial-login-trigger, .initial-admin-trigger {
            width: 120px; height: 120px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: white; font-family: 'Cinzel', serif; font-weight: bold;
            cursor: pointer; border: 3px solid rgba(255, 255, 255, 0.3);
            transition: all 0.5s; animation: pulse 2s infinite; z-index: 20; margin: 10px;
        }
        .initial-login-trigger { background: linear-gradient(145deg, #e75480, #c71585); box-shadow: 0 0 20px rgba(255, 69, 0, 0.6); }
        .initial-admin-trigger { background: linear-gradient(145deg, #2c3e50, #000000); box-shadow: 0 0 20px rgba(0, 0, 0, 0.6); }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .fire-outer-circle {
            width: 420px; height: 420px; display: none; 
            justify-content: center; align-items: center;
            border-radius: 50%; background: rgba(46, 11, 11, 0.4);
            border: 2px solid rgba(255, 140, 0, 0.3);
            box-shadow: 0 0 20px #ff4500, inset 0 0 30px #ff4500;
        }

        .login-box, .admin-box, .forgot-box, .reg-box {
            width: 320px; background: linear-gradient(145deg, #e75480, #c71585);
            border-radius: 35px; padding: 30px 25px; text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); border: 1.5px solid rgba(255, 255, 255, 0.4);
            display: none; color: white;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        .admin-box, .forgot-box, .reg-box { background: linear-gradient(145deg, #2c3e50, #000000); }

        .input-field { position: relative; margin-bottom: 15px; }
        .input-field i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #8b0000; }
        .input-field input, .input-field select {
            width: 100%; padding: 10px 15px 10px 45px; border-radius: 25px; border: none; outline: none;
        }

        button {
            width: 100%; padding: 12px; border-radius: 25px; border: none;
            background: linear-gradient(to right, #db7093, #b01472);
            color: white; cursor: pointer; font-weight: bold; margin-top: 10px;
        }

        .footer-links a { display: block; color: white; text-decoration: none; font-size: 13px; margin-top: 10px; }

        /* --- Main Dashboard UI (Fixed Scroll logic) --- */
        #dashboard {
            display: none; width: 100%; min-height: 100vh; 
            background: url('https://i.postimg.cc/vHTXnTPv/j.png') no-repeat center center/cover;
            flex-direction: column; position: relative; z-index: 1000;
            background-attachment: fixed;
        }

        header { 
            background: rgba(63, 81, 181, 0.9); 
            padding: 15px; 
            text-align: left; 
            font-size: 20px; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            position: sticky; top: 0;
            z-index: 1001;
            color: white;
        }
        .header-logo { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }

        .content-area { 
            flex: 1; 
            padding: 15px; 
            padding-bottom: 100px; /* নিচ থেকে স্পেস রাখা হয়েছে যাতে নববার কন্টেন্ট ঢেকে না দেয় */
            background: rgba(26, 34, 45, 0.7); 
        }

        .profile-card {
            background: rgba(224, 224, 224, 0.9); border-radius: 20px; padding: 20px; color: #333;
            display: flex; align-items: center; gap: 20px; margin-bottom: 15px; position: relative;
        }
        .profile-pic { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #fff; background: #ccc; object-fit: cover; }
        
        .coin-circle {
            position: absolute; right: 20px; top: 20px;
            width: 70px; height: 70px; border-radius: 50%;
            border: 4px solid #2ecc71; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(255, 255, 255, 0.8); font-weight: bold;
        }
        .coin-circle i { color: #f1c40f; font-size: 14px; }
        .coin-count { font-size: 16px; color: #27ae60; }

        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .online { background: #4caf50; } .offline { background: #f44336; }

        .yp-card {
            background: rgba(220, 220, 220, 0.9); border-radius: 30px; padding: 25px; color: #333; margin-bottom: 15px;
        }
        .yp-title { color: black; font-weight: bold; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .yp-subtitle { color: #666; font-size: 13px; margin-bottom: 20px; }
        .yp-input { width: 100%; padding: 12px 20px; border-radius: 10px; border: none; margin-bottom: 12px; background: white; font-size: 14px; }
        .btn-save-yp { background: #c63927; color: white; border-radius: 10px; padding: 12px; width: 100%; border: none; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        .yp-select { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #eeeeee; appearance: none; position: relative; margin-bottom: 15px; }
        .search-bar-container { margin-bottom: 15px; position: relative; }
        .search-bar-container input { width: 100%; padding: 10px 40px 10px 15px; border-radius: 10px; border: none; }
        .search-bar-container i { position: absolute; right: 15px; top: 12px; color: #3f51b5; cursor: pointer; }

        .ticker-container {
            background: #ffb6c1; padding: 10px; border-radius: 10px; margin: 10px 0;
            overflow: hidden; height: 40px; position: relative;
        }
        .ticker-text {
            position: absolute; width: 100%; text-align: center;
            animation: slideUp 7s infinite linear;
            color: #333; font-weight: bold;
        }
        @keyframes slideUp {
            0%, 15% { top: 40px; opacity: 0; }
            20%, 80% { top: 8px; opacity: 1; }
            85%, 100% { top: -40px; opacity: 0; }
        }

        .list-item {
            background: rgba(224, 224, 224, 0.9); color: #333; padding: 15px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
        }
        
        .image-style-card {
            background: #f8f9fa;
            border-left: 8px solid #ff0000;
            border-radius: 25px;
            padding: 15px 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .image-style-info h4 { color: #000; font-size: 1.3rem; margin-bottom: 2px; }
        .image-style-info p { color: #777; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; }
        .btn-group-right { display: flex; gap: 10px; align-items: center; }
        .btn-play-red {
            background: #ff0000; color: white; text-decoration: none;
            padding: 10px 25px; border-radius: 20px; font-weight: bold;
            display: flex; align-items: center; gap: 8px; font-size: 14px;
        }
        .btn-delete-red {
            background: #ff0000; color: white; border: none;
            width: 45px; height: 45px; border-radius: 15px;
            font-size: 18px; cursor: pointer; display: flex; 
            justify-content: center; align-items: center; font-weight: bold;
        }

        .btn-delete { background: red; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        /* Clock & Weather Box */
        .clock-box {
            border: 2px solid #00f2fe; border-radius: 20px; padding: 15px; text-align: center; margin-top: 20px;
            background: rgba(0,0,0,0.7); color: #fff;
        }
        .time { font-size: 32px; font-weight: bold; color: #00f2fe; text-shadow: 0 0 10px #00f2fe; }
        .weather-info { font-size: 13px; margin-top: 10px; line-height: 1.6; border-top: 1px solid rgba(0, 242, 254, 0.3); padding-top: 10px; }

        /* --- Modern Navigation --- */
        nav {
            position: fixed; bottom: 0; width: 100%; background: #ffffff;
            display: flex; justify-content: space-around; padding: 12px 0; 
            border-top-left-radius: 25px; border-top-right-radius: 25px;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.15);
            z-index: 1001;
        }
        .nav-item { 
            color: #b0b0b0; text-align: center; font-size: 11px; cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; flex: 1;
        }
        .nav-item i { 
            font-size: 22px; display: block; margin-bottom: 4px;
            transition: transform 0.3s ease;
        }
        .nav-item.active { color: #3f51b5; transform: translateY(-5px); }
        .nav-item.active i { transform: scale(1.2); color: #3f51b5; }
        .nav-item::after {
            content: ''; position: absolute; bottom: -8px; left: 50%;
            width: 0; height: 3px; background: #3f51b5;
            transition: all 0.3s ease; transform: translateX(-50%);
            border-radius: 10px;
        }
        .nav-item.active::after { width: 20px; }

        .member-row { border-bottom: 1px solid #444; padding: 15px 10px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.1); margin-bottom: 5px; border-radius: 10px; }
        .member-info { display: flex; align-items: center; gap: 15px; }
        .member-pic { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #fff; cursor: pointer; }
        .btn-accept { background: green; color: white; padding: 5px 10px; font-size: 12px; border-radius: 5px; border:none; cursor: pointer; }
        .btn-reject { background: red; color: white; padding: 5px 10px; font-size: 12px; border-radius: 5px; border:none; cursor: pointer; }
        .btn-member-del { background: #ff0000; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 4px; }
    </style>
</head>
<body>

    <div id="loginScreen" style="display: flex; flex-direction: column; align-items: center; min-height: 100vh; width: 100%; justify-content: center;">
        <div class="initial-login-trigger" id="loginTrigger"><span>LOGIN</span></div>
        <div class="initial-admin-trigger" id="adminTrigger"><span>ADMIN</span></div>

        <div class="fire-outer-circle" id="mainLoginFormContainer">
            <div class="login-box" id="loginBox" style="display: block;">
                <h1>LOGIN</h1>
                <form id="loginForm">
                    <div class="input-field"><i class="fa-solid fa-phone"></i><input type="text" id="loginPhone" placeholder="Phone" required></div>
                    <div class="input-field"><i class="fa-solid fa-lock"></i><input type="password" id="loginPass" placeholder="Password" required></div>
                    <button type="submit">Sign In</button>
                </form>
                <div class="footer-links">
                    <a href="#" id="showForgot">Forgot Password?</a>
                    <a href="#" id="showReg">Registration📓</a>
                    <a href="#" id="goBackHome" style="color: #ffeb3b;">Go Back</a>
                </div>
            </div>
        </div>

        <div class="admin-box" id="adminLoginPage">
            <h1>ADMIN</h1>
            <form id="adminLoginForm">
                <div class="input-field"><i class="fa-solid fa-envelope"></i><input type="text" id="adminEmail" placeholder="admin id" required></div>
                <div class="input-field"><i class="fa-solid fa-key"></i><input type="password" id="adminPass" placeholder="password" required></div>
                <button type="submit" style="background: #182848;">Admin Login</button>
            </form>
            <div class="footer-links"><a href="#" class="back-btn">Back to Home</a></div>
        </div>

        <div class="reg-box" id="registrationPage">
            <h2>REGISTER</h2>
            <form id="regForm">
                <div class="input-field"><i class="fa-solid fa-user"></i><input type="text" id="regName" placeholder="Full Name" required></div>
                <div class="input-field"><i class="fa-solid fa-id-card"></i><input type="text" id="regRoll" placeholder="Roll (3 Digits)" pattern="\d{3}" required></div>
                <div class="input-field"><i class="fa-solid fa-phone"></i><input type="text" id="regPhone" placeholder="Phone (11 Digits)" pattern="\d{11}" required></div>
                <div class="input-field"><i class="fa-solid fa-building"></i>
                    <select id="regDept" required>
                        <option value="">Select Dept</option>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Physics">Physics</option>
                    </select>
                </div>
                <div class="input-field"><i class="fa-solid fa-key"></i><input type="password" id="regPass" placeholder="Password" required></div>
                <button type="submit">Create Account</button>
            </form>
            <div class="footer-links"><a href="#" class="back-btn">Back to Login</a></div>
        </div>

        <div class="forgot-box" id="forgotPage">
            <h1>RECOVERY</h1>
            <form id="forgotForm">
                <div class="input-field"><i class="fa-solid fa-phone"></i><input type="text" id="fPhone" placeholder="Phone" required></div>
                <div class="input-field"><i class="fa-solid fa-id-card"></i><input type="text" id="fRoll" placeholder="Roll" required></div>
                <button type="submit">Show Password</button>
            </form>
            <div class="footer-links"><a href="#" class="back-btn">Back to Login</a></div>
        </div>
    </div>

    <div id="dashboard">
        <header>
            <img src="https://i.postimg.cc/c6nYTxDd/images.png" alt="Logo" class="header-logo" onerror="this.style.display='none'">
            <span>সহজ সমাধান</span>
        </header>
        
        <div class="content-area" id="mainContent"></div>

        <nav id="bottomNav">
            <div class="nav-item active" data-page="home" onclick="showPage('home')"><i class="fa-solid fa-house"></i>Home</div>
            <div class="nav-item" data-page="class" onclick="showPage('class')"><i class="fa-solid fa-video"></i>Class</div>
            <div class="nav-item" data-page="youplay" onclick="showPage('youplay')"><i class="fa-solid fa-play"></i>Youplay</div>
            <div class="nav-item" data-page="settings" onclick="showPage('settings')"><i class="fa-solid fa-gear"></i>Settings</div>
        </nav>
    </div>

    <script>
        // --- Firebase Configuration ---
        const firebaseConfig = {
          apiKey: "AIzaSyCRLphI8oGpUWjgjLH-cAB3W7iNDTB-GwM",
  authDomain: "sohazsomadhan.firebaseapp.com",
  databaseURL: "https://sohazsomadhan-default-rtdb.firebaseio.com",
  projectId: "sohazsomadhan",
  storageBucket: "sohazsomadhan.firebasestorage.app",
  messagingSenderId: "329897003516",
  appId: "1:329897003516:web:7ff471da73eb55e0980a79",
  measurementId: "G-SFQNHLVRYF"
         };  
    
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let members = [];
        let subjects = [];
        let classes = [];
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
        let lastPage = localStorage.getItem('lastPage') || 'home';

        // --- Real-time Listeners ---
        db.ref('members').on('value', (snapshot) => {
            members = snapshot.val() ? Object.values(snapshot.val()) : [];
            localStorage.setItem('members', JSON.stringify(members));
            if(currentUser && currentUser.role !== 'admin') {
                const updatedMe = members.find(m => m.phone === currentUser.phone);
                if(updatedMe) {
                    currentUser = updatedMe;
                    localStorage.setItem('currentUser', JSON.stringify(updatedMe));
                }
            }
            refreshCurrentPage();
        });

        db.ref('subjects').on('value', (snapshot) => {
            subjects = snapshot.val() ? Object.values(snapshot.val()) : [];
            localStorage.setItem('subjects', JSON.stringify(subjects));
            refreshCurrentPage();
        });

        db.ref('classes').on('value', (snapshot) => {
            classes = snapshot.val() ? Object.values(snapshot.val()) : [];
            localStorage.setItem('classes', JSON.stringify(classes));
            refreshCurrentPage();
        });

        window.onload = () => { 
            if(currentUser) { 
                loginSuccess(currentUser, true); 
                checkActivityPenalty();
            }
            updateClock(); 
            setInterval(updateClock, 1000); 
            setInterval(updateTicker, 7000);
        };

        function refreshCurrentPage() {
            if(document.getElementById('dashboard').style.display === 'flex') {
                showPage(lastPage);
            }
        }

        function saveMember(member) {
            db.ref('members/' + member.phone).set(member);
        }

        // --- Coin System Logic ---
        function checkActivityPenalty() {
            if(!currentUser || currentUser.role === 'admin') return;
            
            const now = Date.now();
            const lastLogin = currentUser.lastSeen || now;
            const hoursPassed = (now - lastLogin) / (1000 * 60 * 60);

            if (hoursPassed >= 12) {
                const user = members.find(m => m.phone === currentUser.phone);
                if(user) {
                    user.coins = (user.coins || 0) - 40;
                    if(user.coins < 0) user.coins = 0;
                    user.lastSeen = now;
                    saveMember(user);
                    alert("আপনি ১২ ঘণ্টার বেশি সময় পর প্রবেশ করেছেন, তাই ৪০ কয়েন কর্তন করা হয়েছে!");
                }
            } else {
                const user = members.find(m => m.phone === currentUser.phone);
                if(user) {
                    user.lastSeen = now;
                    saveMember(user);
                }
            }
        }

        function collectCoin(linkId, url) {
            if(!currentUser || currentUser.role === 'admin') {
                window.open(url, '_blank');
                return;
            }

            const user = members.find(m => m.phone === currentUser.phone);
            if(!user) return;

            user.clickedLinks = user.clickedLinks || [];
            
            if(!user.clickedLinks.includes(linkId.toString())) {
                user.coins = (user.coins || 0) + 20;
                user.clickedLinks.push(linkId.toString());
                saveMember(user);
                alert("অভিনন্দন! আপনি ২০ কয়েন পেয়েছেন।");
            }
            window.open(url, '_blank');
        }

        const loginTrigger = document.getElementById('loginTrigger');
        const adminTrigger = document.getElementById('adminTrigger');
        const mainLoginForm = document.getElementById('mainLoginFormContainer');
        const adminLoginPage = document.getElementById('adminLoginPage');
        const loginBox = document.getElementById('loginBox');
        const regPage = document.getElementById('registrationPage');
        const forgotPage = document.getElementById('forgotPage');

        loginTrigger.onclick = () => { loginTrigger.style.display='none'; adminTrigger.style.display='none'; mainLoginForm.style.display='flex'; loginBox.style.display='block'; };
        adminTrigger.onclick = () => { loginTrigger.style.display='none'; adminTrigger.style.display='none'; adminLoginPage.style.display='block'; };
        
        document.getElementById('showReg').onclick = (e) => { e.preventDefault(); loginBox.style.display='none'; regPage.style.display='block'; };
        document.getElementById('showForgot').onclick = (e) => { e.preventDefault(); loginBox.style.display='none'; forgotPage.style.display='block'; };

        document.querySelectorAll('.back-btn, #goBackHome').forEach(btn => {
            btn.onclick = (e) => { e.preventDefault(); location.reload(); };
        });

        document.getElementById('forgotForm').onsubmit = (e) => {
            e.preventDefault();
            const user = members.find(m => m.phone === document.getElementById('fPhone').value && m.roll === document.getElementById('fRoll').value);
            if(user) alert("আপনার পাসওয়ার্ড হলো: " + user.pass);
            else alert("তথ্য মেলেনি!");
        };

        document.getElementById('regForm').onsubmit = (e) => {
            e.preventDefault();
            const phone = document.getElementById('regPhone').value;
            const newUser = {
                name: document.getElementById('regName').value,
                roll: document.getElementById('regRoll').value,
                phone: phone,
                dept: document.getElementById('regDept').value,
                pass: document.getElementById('regPass').value,
                pic: 'https://via.placeholder.com/80',
                status: 'pending', online: false, role: 'member',
                coins: 0, clickedLinks: ["init"], lastSeen: Date.now()
            };
            if(members.find(m => m.phone === phone)) return alert("নাম্বারটি ইতিমধ্যে আছে!");
            saveMember(newUser);
            alert("রেজিস্ট্রেশন সফল! এডমিন অনুমোদনের অপেক্ষা করুন।");
            location.reload();
        };

        document.getElementById('adminLoginForm').onsubmit = (e) => {
            e.preventDefault();
            if(document.getElementById('adminEmail').value === 'admin@math.com' && document.getElementById('adminPass').value === 'admin123') {
                loginSuccess({ 
                    name: 'Admin', 
                    roll: 'Main', 
                    role: 'admin', 
                    online: true, 
                    pic: 'https://i.postimg.cc/vHTXnTPv/j.png',
                    coins: '∞'
                });
            } else { alert("ভুল তথ্য!"); }
        };

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const user = members.find(m => m.phone === document.getElementById('loginPhone').value && m.pass === document.getElementById('loginPass').value);
            if(user) {
                if(user.status !== 'accepted') return alert("এডমিন এখনো আপনাকে অনুমতি দেয়নি!");
                user.online = true;
                saveMember(user);
                loginSuccess(user);
            } else { alert("নাম্বার বা পাসওয়ার্ড ভুল!"); }
        };

        function loginSuccess(user, isReload = false) {
            currentUser = user;
            localStorage.setItem('currentUser', JSON.stringify(user));
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
            showPage(isReload ? lastPage : 'home');
        }

        function logout() {
            if(currentUser && currentUser.role !== 'admin') {
                const user = members.find(m => m.phone === currentUser.phone);
                if(user) {
                    user.online = false;
                    user.lastSeen = Date.now();
                    saveMember(user);
                }
            }
            localStorage.removeItem('currentUser');
            localStorage.removeItem('lastPage');
            location.reload();
        }

        let tickerIndex = 0;
        function updateTicker() {
            const ticker = document.getElementById('ticker');
            if(!ticker) return;

            const totalStudents = members.length;
            const onlineStudents = members.filter(m => m.online).length + (currentUser.role === 'admin' ? 1 : 0);
            const totalSubjects = subjects.length;
            const totalClasses = classes.length;

            const messages = [
                `স্বাগতম, ${currentUser.name}!`,
                `মোট ছাত্র সংখ্যা: ${totalStudents}`,
                `বর্তমানে অনলাইনে: ${onlineStudents}`,
                `মোট বিষয় সংখ্যা: ${totalSubjects}`,
                `মোট ক্লাস সংখ্যা: ${totalClasses}`
            ];

            ticker.style.animation = 'none';
            ticker.offsetHeight; 
            ticker.innerText = messages[tickerIndex];
            ticker.style.animation = 'slideUp 7s infinite linear';

            tickerIndex = (tickerIndex + 1) % messages.length;
        }

        function showPage(page) {
            lastPage = page;
            localStorage.setItem('lastPage', page);
            const content = document.getElementById('mainContent');
            
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('active');
                if(el.getAttribute('data-page') === page) el.classList.add('active');
            });

            if(page === 'home') {
                content.innerHTML = `
                    <div class="profile-card">
                        <img src="${currentUser.pic}" class="profile-pic">
                        <div>
                            <p><b>নাম:</b> ${currentUser.name}</p>
                            <p><b>রোল:</b> ${currentUser.roll}</p>
                            <p><span class="status-dot online"></span> Online</p>
                        </div>
                        <div class="coin-circle">
                            <i class="fa-solid fa-coins"></i>
                            <div class="coin-count">${currentUser.coins || 0}</div>
                        </div>
                    </div>
                    <div class="ticker-container"><div class="ticker-text" id="ticker">Welcome to সহজ সমাধান</div></div>
                    <h3>কোর্স সমূহ</h3>
                    <div id="homeSubList"></div>
                `;
                renderHomeSubjects();
                updateTicker();
            } 

            else if(page === 'class') {
                content.innerHTML = `
                    <div class="profile-card" style="flex-direction:column; align-items:flex-start; background:rgba(238, 238, 238, 0.9);">
                        <h4 style="margin-bottom:10px;"><i class="fa-solid fa-book"></i> সাবজেক্ট অনুযায়ী ক্লাস</h4>
                        <select id="classSubSelect" class="yp-input" onchange="renderClasses()">
                            <option value="">সাবজেক্ট বেছে নিন</option>
                            ${subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}
                        </select>
                        ${currentUser.role === 'admin' ? `
                            <input type="text" id="className" placeholder="ক্লাসের নাম" class="yp-input">
                            <input type="text" id="classLink" placeholder="ভিডিও লিংক" class="yp-input">
                            <button onclick="addClass()">ক্লাস সেভ করুন</button>
                        ` : ''}
                    </div>
                    <div id="classListArea"></div>
                `;
                renderClasses();
            }

            else if(page === 'youplay') {
                content.innerHTML = `
                    <div class="search-bar-container">
                        <input type="text" id="ytSearch" placeholder="ইউটিউব ভিডিও সার্চ দিন...">
                        <i class="fa-solid fa-magnifying-glass" onclick="searchYoutube()"></i>
                    </div>
                    <div class="yp-card">
                        <div class="yp-title"><i class="fa-brands fa-youtube" style="color:red;"></i> Youplay প্লে-লিস্ট</div>
                        <div class="yp-subtitle">অধ্যায় ভিত্তিক ইউটিউব প্লে-লিস্ট সমূহ</div>
                        
                        ${currentUser.role === 'admin' ? `
                            <select id="ypSubSelect" class="yp-select" style="background:white; border:1px solid #ddd;">
                                <option value="">সাবজেক্ট সিলেক্ট করুন</option>
                                ${subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}
                            </select>
                            <input type="text" id="ypChapter" placeholder="অধ্যায়ের নাম" class="yp-input">
                            <input type="text" id="ypLink" placeholder="ইউটিউব প্লে-লিস্ট লিংক" class="yp-input">
                            <button class="btn-save-yp" onclick="addYouplay()">প্লে-লিস্ট সেভ করুন</button>
                            <hr style="margin-bottom:15px; opacity:0.3;">
                        ` : ''}
                        
                        <select id="ypSubFilter" class="yp-select" onchange="renderYouplay()">
                            ${subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}
                        </select>
                    </div>
                    <div id="ypListArea"></div>
                `;
                renderYouplay();
            }

            else if(page === 'settings') {
                let displayUser = currentUser;
                if(currentUser.role === 'admin' && members.length > 0) {
                    displayUser = members[0];
                }

                content.innerHTML = `
                    <div class="profile-card" style="background:rgba(51, 51, 51, 0.9); color:white;">
                        <img src="${displayUser.pic}" class="profile-pic">
                        <div>
                            <p><b>NAME :</b> ${displayUser.name.toUpperCase()}</p>
                            <p><b>ROLL :</b> ${displayUser.roll}</p>
                        </div>
                    </div>
                    ${currentUser.role === 'admin' ? `
                        <input type="text" id="newSubName" placeholder="নতুন সাবজেক্ট যোগ করুন" style="width:100%; padding:10px; margin:10px 0; border-radius:10px;">
                        <button onclick="addSubject()">সাবজেক্ট সেভ করুন</button>
                    ` : ''}
                    
                    <button style="width:100%; padding:12px; margin:15px 0; border-radius:10px; background:#3f51b5; color:white; border:none; font-weight:bold;" onclick="showMemberManage()">সদস্য তালিকা (Member List)</button>
                    
                    <div class="clock-box" id="clockBox">
                        <div class="time" id="clockTime">00:00:00 AM</div>
                        <div style="font-weight:bold; margin-top:5px;" id="dayName">লোড হচ্ছে...</div>
                        <div style="color:#00f2fe; font-weight:bold;" id="engDate">তারিখ লোড হচ্ছে...</div>
                        <div style="color:#fff; font-size:14px;" id="bengaliDate">বাংলা তারিখ লোড হচ্ছে...</div>
                        <div class="weather-info" id="weatherDetail">ঋতু, তাপমাত্রা ও বাতাস লোড হচ্ছে...</div>
                    </div>
                    <button style="background:#000; margin-top:15px; width:100%;" onclick="logout()">Log Out</button>
                `;
                updateClock();
            }
            window.scrollTo(0,0); /* পেজ পরিবর্তন করলে স্ক্রল যেন উপরে চলে যায় */
        }

        function searchYoutube() {
            const query = document.getElementById('ytSearch').value;
            if(query) window.open(`https://www.youtube.com/results?search_query=${query}`, '_blank');
        }

        function addYouplay() {
            const subId = document.getElementById('ypSubSelect').value;
            const name = document.getElementById('ypChapter').value;
            const link = document.getElementById('ypLink').value;
            if(!subId || !name || !link) return alert("সব ঘর পূরণ করুন");
            const id = Date.now();
            db.ref('classes/' + id).set({ id, subId: 'yp_' + subId, name, link });
            alert("সংরক্ষিত হয়েছে!");
        }

        function renderYouplay() {
            const filterVal = document.getElementById('ypSubFilter') ? document.getElementById('ypSubFilter').value : "";
            const list = document.getElementById('ypListArea');
            if(!list) return;

            const ypData = classes.filter(c => c.subId === 'yp_' + filterVal);

            list.innerHTML = ypData.map(c => {
                const originalSubId = c.subId.replace('yp_', '');
                const subObj = subjects.find(s => s.id == originalSubId);
                const subName = subObj ? subObj.name : "Youtube Playlist";

                return `
                <div class="image-style-card">
                    <div class="image-style-info">
                        <h4>${c.name}</h4>
                        <p>${subName}</p>
                    </div>
                    <div class="btn-group-right">
                        <button class="btn-play-red" onclick="collectCoin(${c.id}, '${c.link}')">
                            <i class="fa-brands fa-youtube"></i> Play
                        </button>
                        ${currentUser.role === 'admin' ? `<button class="btn-delete-red" onclick="deleteClass(${c.id})">X</button>` : ''}
                    </div>
                </div>
            `;}).join('');
        }

        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
            const engDate = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
            const dayName = now.toLocaleDateString('bn-BD', { weekday: 'long' });
            
            const month = now.getMonth(); 
            const day = now.getDate();
            let season = "";
            let bnMonth = "";
            let bnDay = day + 15; if(bnDay > 30) bnDay = bnDay - 30;

            if (month == 3 && day >= 14 || month == 4 && day < 15) { bnMonth = "বৈশাখ"; season = "গ্রীষ্মকাল"; }
            else if (month == 4 && day >= 15 || month == 5 && day < 15) { bnMonth = "জ্যৈষ্ঠ"; season = "গ্রীষ্মকাল"; }
            else if (month == 5 && day >= 15 || month == 6 && day < 15) { bnMonth = "আষাঢ়"; season = "বর্ষাকাল"; }
            else if (month == 6 && day >= 15 || month == 7 && day < 16) { bnMonth = "শ্রাবণ"; season = "বর্ষাকাল"; }
            else if (month == 7 && day >= 16 || month == 8 && day < 16) { bnMonth = "ভাদ্র"; season = "শরৎকাল"; }
            else if (month == 8 && day >= 16 || month == 9 && day < 16) { bnMonth = "আশ্বিন"; season = "শরৎকাল"; }
            else if (month == 9 && day >= 16 || month == 10 && day < 15) { bnMonth = "কার্তিক"; season = "হেমন্তকাল"; }
            else if (month == 10 && day >= 15 || month == 11 && day < 15) { bnMonth = "অগ্রহায়ণ"; season = "হেমন্তকাল"; }
            else if (month == 11 && day >= 15 || month == 0 && day < 14) { bnMonth = "পৌষ"; season = "শীতকাল"; }
            else if (month == 0 && day >= 14 || month == 1 && day < 14) { bnMonth = "মাঘ"; season = "শীতকাল"; }
            else if (month == 1 && day >= 14 || month == 2 && day < 15) { bnMonth = "ফাল্গুন"; season = "বসন্তকাল"; }
            else { bnMonth = "চৈত্র"; season = "বসন্তকাল"; }

            if(document.getElementById('clockTime')) {
                document.getElementById('clockTime').innerText = timeStr;
                document.getElementById('dayName').innerText = dayName;
                document.getElementById('engDate').innerText = engDate;
                document.getElementById('bengaliDate').innerText = `${bnDay} ${bnMonth}, ১৪৩২ (বঙ্গাব্দ)`;
                document.getElementById('weatherDetail').innerHTML = `
                    ঋতু: ${season} | তাপমাত্রা: 31°C <br>
                    বাতাস: 14 km/h | আর্দ্রতা: 65%
                `;
            }
        }

        function addSubject() {
            const name = document.getElementById('newSubName').value;
            if(!name) return;
            const id = Date.now();
            db.ref('subjects/' + id).set({ id: id, name: name });
            document.getElementById('newSubName').value = '';
        }

        function renderHomeSubjects() {
            const list = document.getElementById('homeSubList');
            if(!list) return;
            list.innerHTML = subjects.map(s => {
                const count = classes.filter(c => c.subId == s.id).length;
                return `
                <div class="list-item">
                    <span><i class="fa-solid fa-book-open" style="color:blue"></i> ${s.name} <small style="background:#3f51b5; color:white; padding:2px 8px; border-radius:10px; font-size:10px; margin-left:5px;">${count}</small></span>
                    ${currentUser.role === 'admin' ? `<button class="btn-delete" onclick="deleteSub(${s.id})">X</button>` : ''}
                </div>
            `;}).join('');
        }

        function deleteSub(id) { 
            if(confirm("নিশ্চিত তো?")) db.ref('subjects/' + id).remove(); 
        }

        function addClass() {
            const subId = document.getElementById('classSubSelect').value;
            const name = document.getElementById('className').value;
            const link = document.getElementById('classLink').value;
            if(!subId || !name || !link) return alert("সব তথ্য দিন");
            const id = Date.now();
            db.ref('classes/' + id).set({ id, subId, name, link });
            document.getElementById('className').value = '';
            document.getElementById('classLink').value = '';
        }

        function renderClasses() {
            const selectedSub = document.getElementById('classSubSelect') ? document.getElementById('classSubSelect').value : "";
            const list = document.getElementById('classListArea');
            if(!list) return;

            const filteredClasses = classes.filter(c => c.subId === selectedSub);

            list.innerHTML = filteredClasses.map(c => {
                const subObj = subjects.find(s => s.id == c.subId);
                const subName = subObj ? subObj.name : "Class Video";

                return `
                <div class="image-style-card">
                    <div class="image-style-info">
                        <h4>${c.name}</h4>
                        <p>${subName}</p>
                    </div>
                    <div class="btn-group-right">
                        <button class="btn-play-red" onclick="collectCoin(${c.id}, '${c.link}')">
                            <i class="fa-brands fa-youtube"></i> Play
                        </button>
                        ${currentUser.role === 'admin' ? `<button class="btn-delete-red" onclick="deleteClass(${c.id})">X</button>` : ''}
                    </div>
                </div>
            `;}).join('');
        }

        function deleteClass(id) { 
            if(confirm("মুছে ফেলবেন?")) db.ref('classes/' + id).remove(); 
        }

        function showMemberManage() {
            const content = document.getElementById('mainContent');
            const isAdmin = currentUser.role === 'admin';
            
            content.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3>সদস্য তালিকা</h3>
                    <button onclick="showPage('settings')" style="width:auto; padding:5px 15px;">Back</button>
                </div>
                ${members.map(m => `
                    <div class="member-row">
                        <div class="member-info">
                            <img src="${m.pic || 'https://via.placeholder.com/80'}" class="member-pic" 
                                 onclick="${isAdmin ? `changeMemberPic('${m.phone}')` : ''}" 
                                 title="${isAdmin ? 'Change Profile Picture' : ''}">
                            <div>
                                <p><b>${m.name}</b></p>
                                <p>Roll: ${m.roll} | Coins: ${m.coins || 0}</p>
                                ${isAdmin ? `<p><small>${m.phone} | ${m.online ? 'Online' : 'Offline'}</small></p>` : ''}
                            </div>
                        </div>
                        <div style="display:flex; flex-direction:column; gap:5px; align-items:flex-end;">
                            ${isAdmin ? `
                                <div style="display:flex; gap:5px;">
                                    ${m.status === 'pending' ? `
                                        <button class="btn-accept" onclick="updateStatus('${m.phone}', 'accepted')">Accept</button>
                                        <button class="btn-reject" onclick="updateStatus('${m.phone}', 'rejected')">Reject</button>
                                    ` : `<span style="color:#4caf50; font-weight:bold; font-size:12px;">${m.status.toUpperCase()}</span>`}
                                </div>
                                <button class="btn-member-del" onclick="deleteMember('${m.phone}')"><i class="fa-solid fa-trash"></i> Del</button>
                            ` : ''}
                        </div>
                    </div>
                `).join('')}
            `;
            window.scrollTo(0,0);
        }

        function deleteMember(phone) {
            if(confirm("আপনি কি নিশ্চিতভাবে এই সদস্যকে মুছে ফেলতে চান?")) {
                db.ref('members/' + phone).remove();
            }
        }

        function changeMemberPic(phone) {
            const newPic = prompt("প্রোফাইল পিকচারের নতুন লিংক দিন:");
            if(newPic) {
                db.ref('members/' + phone).update({ pic: newPic });
            }
        }

        function updateStatus(phone, status) {
            db.ref('members/' + phone).update({ status: status });
        }
    </script>
</body>
</html>
